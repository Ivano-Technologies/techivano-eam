# Single Vercel project: push to main → run unit tests + smoke → deploy once → all domains updated.
# Domains: admin.techivano.com, nrcseam.techivano.com, techivano.com (host-based routing in app).
# Requires: VERCEL_TOKEN; E2E/Supabase secrets for test job.
name: Techivano Auto Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      E2E_AUTH_EMAIL: ${{ secrets.E2E_AUTH_EMAIL }}
      E2E_AUTH_PASSWORD: ${{ secrets.E2E_AUTH_PASSWORD }}
      E2E_BASE_URL: http://localhost:33123
      PORT: "33123"
      CI: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:ci

      - run: pnpm build

      - name: Run migrations
        run: pnpm db:migrate

      - name: Verify schema (organization_members.permissions)
        run: node scripts/verify-permissions-column.mjs

      - name: Start server
        run: pnpm start &

      - name: Wait for server
        run: npx wait-on http://localhost:33123/login

      - name: Smoke test (login page)
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" http://localhost:33123/login)
          if [ "$code" != "200" ]; then echo "Smoke test failed: /login returned $code"; exit 1; fi

  deploy:
    runs-on: ubuntu-latest
    needs: test

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - name: Deploy to Vercel (single project, all domains)
        run: npx vercel deploy . --prod --yes --token="$VERCEL_TOKEN"
