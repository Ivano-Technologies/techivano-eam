# Deploy-blocking: Auth E2E must pass before merge. Broken login → CI fails → deploy blocked.
# Full pipeline (test:e2e:auth:full) requires: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY,
# VITE_SUPABASE_ANON_KEY, DATABASE_URL, E2E_AUTH_EMAIL, E2E_AUTH_PASSWORD.
name: Auth E2E

on:
  pull_request:
  push:
    branches: [main, staging]

jobs:
  auth-test:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      E2E_AUTH_EMAIL: ${{ secrets.E2E_AUTH_EMAIL }}
      E2E_AUTH_PASSWORD: ${{ secrets.E2E_AUTH_PASSWORD }}
      E2E_BASE_URL: http://localhost:33123
      PORT: "33123"
      CI: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Run migrations
        run: pnpm db:migrate

      - name: Verify schema (organization_members.permissions)
        run: node scripts/verify-permissions-column.mjs

      - name: Start server
        run: pnpm start &

      - name: Wait for server
        run: npx wait-on http://localhost:33123/login

      - name: Install Playwright
        run: pnpm exec playwright install --with-deps

      - name: Run auth tests (seed user, seed org, session injection, Playwright)
        run: pnpm run test:e2e:auth:full

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
