# Deployment safety: build, lint, typecheck must pass before merge.
# Schema + tests: validate job runs pnpm test; migrations job runs supabase db reset
# so schema and tests never drift. See docs/DEPLOYMENT_ARCHITECTURE.md.
name: CI

on:
  push:
    branches: ["main", "staging", "develop", "feature/**"]
  pull_request:
    branches: ["main", "staging", "develop", "feature/**"]

jobs:
  validate:
    runs-on: ubuntu-latest
    # Optional: set to true to use Node 24 (Actions default from June 2026). Leave false to keep Node 20 until ready.
    # env:
    #   FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Tests
        run: pnpm test

      - name: Phase 4 tests
        run: pnpm test:phase4

      - name: Worker tests
        run: pnpm test:workers

      - name: Build API + frontend
        run: pnpm build

      - name: Build worker
        run: pnpm build:worker

  migrations:
    name: Supabase migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase (local)
        run: supabase start -x studio -x realtime -x storage -x edge-runtime

      - name: Lint migrations
        run: supabase migration list

      - name: Validate migrations (db reset)
        run: supabase db reset

  e2e-auth:
    name: E2E Auth (optional)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.E2E_ENABLED == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E auth test
        env:
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL || 'https://www.techivano.com' }}
          E2E_AUTH_EMAIL: ${{ secrets.E2E_AUTH_EMAIL }}
          E2E_AUTH_PASSWORD: ${{ secrets.E2E_AUTH_PASSWORD }}
        run: pnpm exec playwright test tests/e2e/auth.spec.ts --reporter=html
        continue-on-error: true

      - name: Upload Playwright report
        if: failure() || always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload test results (screenshots)
        if: failure() || always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
