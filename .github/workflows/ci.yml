# Deployment safety: build, lint, typecheck must pass before merge.
# Note: Supabase migrations are NOT run in CI. Run manually (e.g. supabase db push) or in a separate release process.
name: CI

on:
  push:
    branches: ["main", "staging", "develop", "feature/**"]
  pull_request:
    branches: ["main", "staging", "develop", "feature/**"]

jobs:
  validate:
    runs-on: ubuntu-latest
    # Optional: set to true to use Node 24 (Actions default from June 2026). Leave false to keep Node 20 until ready.
    # env:
    #   FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Repo integrity checks
        run: pnpm check:all

      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test:ci
      - name: API route integration tests (serverless handlers)
        run: pnpm test:api:routes
      - name: Build
        run: pnpm build && pnpm build:worker
