# Deployment safety: build, lint, typecheck must pass before merge.
# See docs/DEPLOYMENT_AND_BRANCH_STRATEGY.md
name: CI

on:
  push:
    branches: ["main", "staging", "develop"]
  pull_request:
    branches: ["main", "staging", "develop"]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Tests
        run: pnpm test

      - name: Phase 4 tests
        run: pnpm test:phase4

      - name: Worker tests
        run: pnpm test:workers

      - name: Build API + frontend
        run: pnpm build

      - name: Build worker
        run: pnpm build:worker
